<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Ai - Raj</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src=""https://cdn.jsdelivr.net/npm/marked/marked.min.js></script>
</head>
<body>

    <div class="main-box">
        <header class="header">
            <div class="ai-name" id="ai-brand-name">My Ai</div>
            <div class="account"><i class="fa-solid fa-circle-user"></i></div>
        </header>

        <hr>

        <div id="chatWindow" class="chat-display">
            <div id="greetings">Hi! Raj, aaj kya poochna hai</div>
        </div>

        <div class="ask-container">
            <input type="text" id="userInput" placeholder="Jo chaho pooch lo" class="ask-box">
            <button id="sendBtn" class="ask-button">
                <i class="fa-sharp fa-solid fa-paper-plane ask-icon"></i> Ask
            </button>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>     
</html>
